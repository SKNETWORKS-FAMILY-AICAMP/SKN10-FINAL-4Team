<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORA - 로그인</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #D0BFFF;
            font-family: 'Roboto', Arial, sans-serif;
        }
        .main-wrapper {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 70px;
            background: #4B3B76;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 25px;
        }
        .sidebar-logo {
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
        }
        .sidebar-icon {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #BFA8E4;
            border-radius: 40px;
            padding: 48px 56px 40px 56px;
            box-shadow: 0 4px 24px rgba(120,81,169,0.10);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 350px;
        }
        .login-title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #231942;
            margin-bottom: 12px;
        }
        .login-desc {
            color: #fff;
            font-size: 16px;
            margin-bottom: 32px;
            text-align: center;
        }
        .login-label {
            color: #231942;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
            margin-top: 18px;
            align-self: flex-start;
        }
        .login-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            margin-bottom: 6px;
            background: #E7DFFF;
            font-family: 'Roboto', Arial, sans-serif;
        }
        .login-input:focus {
            outline: 2px solid #7851A9;
        }
        .login-btn {
            width: 100%;
            margin-top: 24px;
            padding: 12px 0;
            background: #D0BFFF;
            color: #231942;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 0 #7851A9;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #E7DFFF;
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-logo">B</div>
        <div class="sidebar-icon">🏠</div>
        <div class="sidebar-icon">🔍</div>
        <div class="sidebar-icon">📅</div>
        <div class="sidebar-icon">💬</div>
        <div class="sidebar-icon">🤍</div>
        <div class="sidebar-icon">➕</div>
        <div class="sidebar-icon">🟣</div>
    </div>
    <div class="login-container">
        <form class="login-card" method="post">
            {% csrf_token %}
            <div class="login-title">BORA</div>
            <div class="login-desc">유학생들을 위한 선배들과의 소통</div>
            <label class="login-label" for="id_username">아이디</label>
            <input class="login-input" type="text" name="username" id="id_username" required>
            <label class="login-label" for="id_password">비밀번호</label>
            <input class="login-input" type="password" name="password" id="id_password" required>
            <button class="login-btn" type="submit">로그인</button>
            {% if form.errors %}
                <div style="color: #c00; margin-top: 10px;">아이디 또는 비밀번호가 올바르지 않습니다.</div>
            {% endif %}
        </form>
    </div>
</div>
</body>
</html>
